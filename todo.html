<input id="input">
<button onclick="add()">Add</button>
<ul id="list-container">
    <li>
        hello
        <button onclick="deleteItem(event)">delete</button>
    </li>
</ul>

<script>
    var ul = document.getElementById("list-container")
    var input = document.getElementById("input")

    function add(){
        var listitem = document.createElement("li") //create an list 
        listitem.innerHTML = input.value + "<button onclick='deleteItem(event)'>Delete</button>" //show the given input word into the side of list
        ul.append(listitem) //the input word position in bottom of list
    }

    function deleteItem(event){
        event.target.parentElement.remove()
    }
</script>
