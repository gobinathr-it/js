<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>
</head>
<body>

<h2>Student Form</h2>

<form id="form">

Name: <input type="text" id="name" required><br>

Age: <input type="number" id="age" required><br>

Gender:
<input type="radio" name="gender" value="Male" checked>Male
<input type="radio" name="gender" value="Female">Female
<br>

Course:
<select id="course">
<option>JavaScript</option>
<option>Python</option>
<option>Java</option>
</select>
<br>

Email: <input type="email" id="email"><br>

<button type="submit">Save</button>

</form>

<br>

<button onclick="sortTable()">Sort By Name</button>

<br>
  <br>
<table border="2" id="table">
<tr>
<th>Name</th>
<th>Age</th>
<th>Course</th>
<th>Gender</th>
<th>Email</th>
<th>Action</th>
</tr>
</table>

<script>

let students = []

document.getElementById("form").addEventListener("submit", function(e){

e.preventDefault()

let name = document.getElementById("name").value
let age = document.getElementById("age").value
let course = document.getElementById("course").value
let email = document.getElementById("email").value
let gender = document.querySelector('input[name="gender"]:checked').value

students.push({name, age, course, gender, email})

display()

})

function display(){

let table = document.getElementById("table")

table.innerHTML = `
<tr>
<th>Name</th>
<th>Age</th>
<th>Course</th>
<th>Gender</th>
<th>Email</th>
<th>Action</th>
</tr>
`

students.forEach((s, index)=>{

let row = table.insertRow()

row.insertCell(0).innerText = s.name
row.insertCell(1).innerText = s.age
row.insertCell(2).innerText = s.course
row.insertCell(3).innerText = s.gender
row.insertCell(4).innerText = s.email

let btn = document.createElement("button")
btn.innerText = "Delete"

btn.onclick = function(){
students.splice(index,1)
display()
}

row.insertCell(5).appendChild(btn)

})

}

function sortTable(){

students.sort((a,b)=> a.name.localeCompare(b.name))

display()

}

</script>

</body>
</html>
