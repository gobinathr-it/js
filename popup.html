<style>
    .overlay{
        background-color: black;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0%;
        left: 0%;
        opacity: 0.8;
        z-index: 1;
        display: none;
    }

    .popupbox{
        width: 40%;
        position: absolute;
        z-index: 2;
        background-color: black;
        color: white;
        padding: 20px;
        border-radius: 10px;
        left: 30%;
        display: none;
    }
</style>


<button onclick="show()">show</button>
<div class="overlay"></div>
<div class="popupbox">
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quae quasi esse consequuntur repellendus voluptates quos, ex aut fuga tempore officiis facere incidunt labore quidem numquam nemo? Ut nihil accusamus amet.</p>
    <button onclick="closepopup()">close</button>
</div>

<script>

    //pop overlay and popbox can be select
    var popupoverlay = document.querySelector(".overlay")
    var popupbox = document.querySelector(".popupbox")

    function show(){
        popupbox.style.display = "block"
        popupoverlay.style.display = "block"
    }

    function closepopup(){
        popupbox.style.display = "none"
        popupoverlay.style.display = "none"
    }
</script>

<button id="btn">
    show
</button>

<script>
    var button = document.getElementById("btn")

    button.addEventListener
    (
    "click",
    function()
    {
        alert("hello")
    }
    )

     button.addEventListener
    (
    "mouseover",
    function()
    {
        alert("mouse are moving")
    }
    )
</script>
